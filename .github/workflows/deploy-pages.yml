name: Deploy GitHub Pages

# Tek deploy kanalı — repo Settings → Pages → Source: "GitHub Actions" olmalı.
# "Deploy from branch" açıksa iki workflow yarışır ve deploy gecikir/iptal olur.

on:
  push:
    branches: [main]
    paths:
      - "**.html"
      - "css/**"
      - "js/**"
      - "icons/**"
      - "sw.js"
      - "manifest.json"
      - ".nojekyll"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Site dosyalarini hazirla
        run: |
          mkdir _site
          cp -r css icons js _site/
          cp index.html sw.js manifest.json _site/
          cp .nojekyll _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
