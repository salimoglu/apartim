<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Apart1m">
  <defs>
    <linearGradient id="ev-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f6"/>
      <stop offset="100%" stop-color="#d8e0ea"/>
    </linearGradient>
    <linearGradient id="ev-house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6db8ff"/>
      <stop offset="55%" stop-color="#3d8ee8"/>
      <stop offset="100%" stop-color="#1a3f7a"/>
    </linearGradient>
    <filter id="ev-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1a3f7a" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#ev-bg)"/>
  <g filter="url(#ev-shadow)" transform="translate(128 132)">
    <!-- Ana ev gövdesi + çat1 (ortalanm1_) -->
    <path fill="url(#ev-house)" d="
      M-72,-78 L0,-132 L72,-78 L72,78 L-72,78 Z
      M52,-88 L62,-88 L62,-108 L52,-108 Z"/>
    <!-- Pencere (çat1 alt1) -->
    <circle cx="0" cy="-58" r="11" fill="#eef6ff" opacity=".95"/>
    <path stroke="#1a3f7a" stroke-width="2.5" stroke-linecap="round" d="M0,-69 V-47 M-11,-58 H11" opacity=".35"/>
    <!-- Üst bloklar -->
    <rect x="-46" y="-36" width="28" height="24" rx="3" fill="#eef6ff" opacity=".88"/>
    <rect x="18" y="-36" width="28" height="24" rx="3" fill="#eef6ff" opacity=".88"/>
    <circle cx="-32" cy="-24" r="2.2" fill="#1a3f7a" opacity=".25"/>
    <circle cx="-32" cy="-16" r="2.2" fill="#1a3f7a" opacity=".25"/>
    <!-- Kap1 -->
    <rect x="-42" y="18" width="34" height="60" rx="4" fill="#eef6ff" opacity=".92"/>
    <!-- Anahtar delii -->
    <circle cx="34" cy="52" r="9" fill="#eef6ff" opacity=".92"/>
    <rect x="31" y="52" width="6" height="16" rx="2" fill="#eef6ff" opacity=".92"/>
  </g>
</svg>
